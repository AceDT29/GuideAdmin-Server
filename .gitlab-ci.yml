image: node:20

# Configurar caché para agilizar las ejecuciones del pipeline
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - node_modules/

before_script:
  # npm ci instala exactamente las versiones de package-lock.json de forma limpia y rápida
  - npm ci --cache .npm --prefer-offline

stages:
  - test

# Job para ejecutar las pruebas unitarias
run_tests:
  stage: test
  script:
    - npm test
